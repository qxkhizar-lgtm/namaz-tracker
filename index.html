<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0F1A">
<title>Namaz Tracker</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0e1a;
    --bg-deep2:#0e1424;
    --panel: rgba(24,34,56,0.55);
    --panel-solid:#141c31;
    --border: rgba(212,175,55,0.16);
    --border-strong: rgba(212,175,55,0.32);
    --gold:#d4af37;
    --gold-soft:#c9a85c;
    --gold-dim: rgba(212,175,55,0.15);
    --green:#2f8f6f;
    --green-bright:#3fbf93;
    --ivory:#ece6d6;
    --muted:#8b96ad;
    --danger:#c1554a;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--ivory);
    background:
      radial-gradient(1px 1px at 20% 15%, rgba(255,255,255,0.5) 0, transparent 50%),
      radial-gradient(1px 1px at 70% 8%, rgba(255,255,255,0.35) 0, transparent 50%),
      radial-gradient(1.5px 1.5px at 85% 25%, rgba(255,255,255,0.4) 0, transparent 50%),
      radial-gradient(1px 1px at 40% 35%, rgba(255,255,255,0.3) 0, transparent 50%),
      radial-gradient(1px 1px at 10% 55%, rgba(255,255,255,0.25) 0, transparent 50%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-deep2) 60%, #0c1220 100%);
    min-height:100%;
    -webkit-font-smoothing:antialiased;
  }
  .shell{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    padding:env(safe-area-inset-top) 16px calc(84px + env(safe-area-inset-bottom)) 16px;
    position:relative;
  }
  h1,h2,h3{font-family:'Amiri',serif; font-weight:700; margin:0;}
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 2px 14px 2px;
  }
  .brand{display:flex; flex-direction:column; gap:2px;}
  .brand .kicker{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold-soft);}
  .brand h1{font-size:26px; color:var(--ivory);}
  .gear{
    width:38px;height:38px;border-radius:50%;
    background:var(--panel); border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center; cursor:pointer;
    color:var(--gold-soft); font-size:18px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
    backdrop-filter: blur(6px);
  }
  .muted{color:var(--muted); font-size:13px;}
  .age-line{font-size:15px; color:var(--ivory); margin-top:4px;}
  .age-line b{color:var(--gold);}

  /* Tasbih beads row (signature element) */
  .beads{display:flex; justify-content:space-between; align-items:center; margin:6px 0 4px 0; padding:0 4px;}
  .bead-wrap{display:flex; flex-direction:column; align-items:center; gap:8px; flex:1;}
  .bead{
    width:34px;height:34px;border-radius:50%;
    border:2px solid var(--border-strong);
    background:radial-gradient(circle at 35% 30%, #1c2540, #10162a);
    transition:all .25s ease;
    position:relative;
  }
  .bead.done{
    background:radial-gradient(circle at 35% 30%, #f3d879, var(--gold));
    border-color:var(--gold);
    box-shadow:0 0 14px rgba(212,175,55,0.55);
  }
  .bead-label{font-size:10.5px; color:var(--muted); letter-spacing:.03em;}
  .bead-thread{
    position:absolute; top:17px; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, var(--border-strong) 15%, var(--border-strong) 85%, transparent);
    z-index:0;
  }
  .beads-row{position:relative;}

  .prayer-row{
    display:flex; align-items:center; gap:12px;
    padding:12px 4px; border-bottom:1px solid var(--border);
  }
  .prayer-row:last-child{border-bottom:none;}
  .toggle-circle{
    width:30px;height:30px;border-radius:50%;
    border:2px solid var(--border-strong);
    background:transparent; flex-shrink:0; cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    color:transparent; font-size:15px; transition:all .18s ease;
  }
  .toggle-circle.on{
    background:var(--green-bright); border-color:var(--green-bright); color:#08130f;
  }
  .prayer-name{flex:1; font-size:16px; font-weight:600;}
  .prayer-name small{display:block; font-weight:400; color:var(--muted); font-size:11.5px; margin-top:1px;}
  .qaza-input-wrap{display:flex; flex-direction:column; align-items:flex-end; gap:2px;}
  .qaza-input-wrap label{font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em;}
  .qaza-input{
    width:56px; text-align:center; padding:7px 4px;
    border-radius:10px; border:1px solid var(--border-strong);
    background:#0d1425; color:var(--ivory); font-size:15px; font-family:'Inter';
  }
  .qaza-input:focus{outline:1px solid var(--gold); border-color:var(--gold);}

  .btn{
    display:block; width:100%; padding:14px; border-radius:14px; border:none;
    font-family:'Inter'; font-weight:600; font-size:15px; cursor:pointer;
    background:linear-gradient(180deg, var(--gold), var(--gold-soft));
    color:#1a1405; margin-top:6px;
  }
  .btn:active{transform:scale(0.98);}
  .btn.secondary{
    background:transparent; border:1px solid var(--border-strong); color:var(--ivory);
  }
  .btn.danger{background:var(--danger); color:#fff;}

  .save-note{text-align:center; font-size:12.5px; color:var(--green-bright); margin-top:8px; min-height:16px;}

  /* Qaza tab — redesigned */
  .qaza-hero{
    display:flex; flex-direction:column; align-items:center; padding:26px 10px 18px 10px;
  }
  .ring-wrap{position:relative; width:172px; height:172px;}
  .ring-center{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
  }
  .ring-center .num{font-family:'Amiri',serif; font-size:42px; color:var(--ivory); line-height:1;}
  .ring-center .lbl{font-size:11.5px; color:var(--muted); margin-top:4px; letter-spacing:.03em;}
  .cleared-pill{
    margin-top:14px; background:var(--gold-dim); border:1px solid var(--border-strong);
    color:var(--gold); font-size:12.5px; font-weight:600; padding:6px 14px; border-radius:20px;
  }

  .qaza-row{padding:14px 2px; border-bottom:1px solid var(--border);}
  .qaza-row:last-child{border-bottom:none;}
  .qaza-row-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
  .qaza-icon-name{display:flex; align-items:center; gap:9px; font-size:15px; font-weight:600;}
  .qaza-icon{
    width:26px;height:26px;border-radius:8px; background:var(--gold-dim);
    display:flex;align-items:center;justify-content:center; font-size:13px;
  }
  .qaza-count{font-size:15px; font-weight:700; color:var(--gold);}
  .qaza-count small{font-weight:400; color:var(--muted); font-size:11px;}
  .qaza-bar-track{
    height:8px; border-radius:6px; background:rgba(255,255,255,0.06); overflow:hidden;
  }
  .qaza-bar-fill{
    height:100%; border-radius:6px;
    background:linear-gradient(90deg, var(--green), var(--green-bright));
    transition:width .4s ease;
  }
  .qaza-row-bottom{font-size:11.5px; color:var(--muted); margin-top:6px;}

  /* Setup screen */
  .setup-hero{text-align:center; padding:36px 10px 20px 10px;}
  .setup-hero h1{font-size:30px;}
  .setup-hero p{color:var(--muted); font-size:14px; margin-top:8px; line-height:1.5;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12.5px; color:var(--gold-soft); margin-bottom:6px; letter-spacing:.02em;}
  .field input{
    width:100%; padding:13px 14px; border-radius:12px; border:1px solid var(--border-strong);
    background:#0d1425; color:var(--ivory); font-size:15px; font-family:'Inter';
  }
  .field .hint{font-size:11.5px; color:var(--muted); margin-top:5px; line-height:1.4;}
  .fixed-note{
    display:flex; align-items:center; gap:10px;
    background:rgba(255,255,255,0.03); border:1px dashed var(--border-strong); border-radius:12px;
    padding:12px 14px; margin-bottom:16px; font-size:12.5px; color:var(--muted); line-height:1.5;
  }
  .fixed-note b{color:var(--gold-soft);}
  .estimate-box{
    background:rgba(212,175,55,0.08); border:1px solid var(--border-strong); border-radius:14px;
    padding:14px; margin:10px 0 18px 0; font-size:13.5px; line-height:1.7;
  }
  .estimate-box b{color:var(--gold);}

  /* History */
  .history-day{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 4px; border-bottom:1px solid var(--border);
  }
  .history-day:last-child{border-bottom:none;}
  .history-day .d{font-size:14px; font-weight:600;}
  .history-day .stats{font-size:12px; color:var(--muted); margin-top:2px;}
  .history-day .badge{
    background:rgba(63,191,147,0.14); color:var(--green-bright); border-radius:20px;
    padding:5px 10px; font-size:12px; font-weight:600;
  }
  .date-picker-row{display:flex; gap:10px; margin-bottom:14px;}
  .date-picker-row input{flex:1;}

  .toast{
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    background:#141c31; border:1px solid var(--border-strong); color:var(--ivory);
    padding:10px 18px; border-radius:30px; font-size:13px; z-index:999;
    opacity:0; transition:opacity .3s ease; pointer-events:none; text-align:center; max-width:90vw;
  }
  .toast.show{opacity:1;}

  .loading-wrap{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:14px;}
  .spinner{
    width:34px;height:34px;border-radius:50%;
    border:3px solid var(--border); border-top-color:var(--gold);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .config-warning{
    background:rgba(193,85,74,0.12); border:1px solid var(--danger); border-radius:14px;
    padding:14px; font-size:13px; line-height:1.6; margin-bottom:16px;
  }
  .config-warning code{background:#1a1020; padding:2px 6px; border-radius:6px; font-size:11.5px;}

  /* Bottom nav */
  .nav{
    position:fixed; bottom:0; left:0; right:0;
    display:flex; justify-content:center;
    padding:10px 16px calc(10px + env(safe-area-inset-bottom)) 16px;
    background:linear-gradient(180deg, transparent, rgba(6,9,17,0.85) 25%, #06090f 100%);
  }
  .nav-inner{
    width:100%; max-width:448px;
    display:flex; background:var(--panel-solid); border:1px solid var(--border);
    border-radius:18px; overflow:hidden;
  }
  .nav-btn{
    flex:1; padding:11px 4px; text-align:center; background:none; border:none;
    color:var(--muted); font-family:'Inter'; font-size:11.5px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .nav-btn .ic{font-size:18px;}
  .nav-btn.active{color:var(--gold);}

  .hidden{display:none !important;}
</style>
</head>
<body>

<div class="shell" id="shell">
  <div class="loading-wrap" id="globalLoader">
    <div class="spinner"></div>
    <div class="muted">Loading...</div>
  </div>
</div>

<div class="nav hidden" id="bottomNav">
  <div class="nav-inner">
    <button class="nav-btn active" data-tab="home"><span class="ic">🕌</span>Today</button>
    <button class="nav-btn" data-tab="qaza"><span class="ic">📿</span>Qaza</button>
    <button class="nav-btn" data-tab="history"><span class="ic">📅</span>History</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ======================= CONFIG ======================= */
/* Paste your Google Apps Script Web App URL here.
   You get this after deploying — see README.md for the full walkthrough. */
const CONFIG = {
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbxx0T6Lw0k7lo3Cz2Y_BTf1XhrOG_XpNiw7jcvIE-8ag74linfPXCTptmMId-qFXcHE/exec"
};
/* ======================================================= */

/* Age at which prayer becomes obligatory — fixed at 7 (not user-editable). */
const FARD_AGE = 7;

const PRAYERS = [
  {key:'Fajr', label:'Fajr', icon:'🌄'},
  {key:'Dhuhr', label:'Dhuhr', icon:'☀️'},
  {key:'Asr', label:'Asr', icon:'🌤️'},
  {key:'Maghrib', label:'Maghrib', icon:'🌇'},
  {key:'Isha', label:'Isha', icon:'🌙'}
];

const shell = document.getElementById('shell');
const bottomNav = document.getElementById('bottomNav');
const toastEl = document.getElementById('toast');

let STATE = {
  profile: null,
  summary: null,
  todayRecord: null,
  activeTab: 'home'
};

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(()=>toastEl.classList.remove('show'), 2200);
}

/* ---------------- API layer (JSONP — avoids CORS issues entirely) ---------------- */
function jsonp(url){
  return new Promise((resolve, reject)=>{
    const cbName = 'cb_' + Math.random().toString(36).slice(2) + Date.now();
    const script = document.createElement('script');
    let settled = false;

    const cleanup = ()=>{
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timer);
    };

    window[cbName] = (data)=>{
      if (settled) return;
      settled = true;
      cleanup();
      resolve(data);
    };

    script.onerror = ()=>{
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error('Could not reach the server. Check your internet connection and the Apps Script URL in CONFIG.SCRIPT_URL.'));
    };

    const timer = setTimeout(()=>{
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error('The server took too long to respond. Please try again.'));
    }, 15000);

    const sep = url.indexOf('?') === -1 ? '?' : '&';
    script.src = url + sep + 'callback=' + cbName;
    document.body.appendChild(script);
  });
}

async function apiGet(action, params={}){
  const usp = new URLSearchParams({action, ...params});
  const result = await jsonp(`${CONFIG.SCRIPT_URL}?${usp.toString()}`);
  if (result && result.error) throw new Error(result.error);
  return result;
}
async function apiPost(action, data){
  const usp = new URLSearchParams({action, payload: JSON.stringify(data)});
  const result = await jsonp(`${CONFIG.SCRIPT_URL}?${usp.toString()}`);
  if (result && result.error) throw new Error(result.error);
  return result;
}

/* ---------------- Age calculation ---------------- */
function ageFromDOB(dobStr, asOf=new Date()){
  const dob = new Date(dobStr+'T00:00:00');
  let years = asOf.getFullYear() - dob.getFullYear();
  let months = asOf.getMonth() - dob.getMonth();
  let days = asOf.getDate() - dob.getDate();
  if (days < 0){
    months -= 1;
    const prevMonth = new Date(asOf.getFullYear(), asOf.getMonth(), 0);
    days += prevMonth.getDate();
  }
  if (months < 0){ months += 12; years -= 1; }
  const decimalYears = (asOf - dob) / (1000*60*60*24*365.25);
  return {years, months, days, decimalYears};
}

/* ======================= INIT ======================= */
async function init(){
  if (!CONFIG.SCRIPT_URL || CONFIG.SCRIPT_URL.indexOf('PASTE_YOUR') === 0){
    renderConfigMissing();
    return;
  }
  try{
    const profile = await apiGet('getProfile');
    if (!profile.exists){
      renderSetup();
    } else {
      STATE.profile = profile;
      await loadAppData();
      renderTab('home');
      bottomNav.classList.remove('hidden');
    }
  } catch(err){
    renderError(err);
  }
}

async function loadAppData(){
  const [summary, todayRecord] = await Promise.all([
    apiGet('getSummary'),
    apiGet('getRecord', {date: todayStr()})
  ]);
  STATE.summary = summary;
  STATE.todayRecord = todayRecord.exists ? todayRecord : null;
}

function renderConfigMissing(){
  shell.innerHTML = `
    <div class="setup-hero">
      <h1>🕌 Namaz Tracker</h1>
    </div>
    <div class="config-warning">
      <b>Setup needed:</b><br><br>
      To connect this app to Google Sheets, open <code>index.html</code> and paste your
      Apps Script Web App URL into <code>CONFIG.SCRIPT_URL</code>.<br><br>
      The full walkthrough is in <b>README.md</b>.
    </div>
  `;
}

function renderError(err){
  shell.innerHTML = `
    <div class="setup-hero">
      <h1>⚠️ Something Went Wrong</h1>
      <p>${(err && err.message) ? err.message : 'Could not connect to the server. Check your internet connection or verify the Apps Script URL.'}</p>
    </div>
    <button class="btn secondary" onclick="init()">Try Again</button>
  `;
}

/* ======================= SETUP SCREEN ======================= */
function renderSetup(prefill){
  bottomNav.classList.add('hidden');
  const p = prefill || {};
  shell.innerHTML = `
    <div class="setup-hero">
      <h1>🕌 Namaz Tracker</h1>
      <p>Enter your details so we can calculate your age and an estimate of your qaza (missed) prayers.</p>
    </div>
    <div class="card">
      <div class="field">
        <label>Date of Birth</label>
        <input type="date" id="in_dob" value="${p.dob||''}">
      </div>
      <div class="fixed-note">
        ⚓ Prayers are counted as obligatory starting at <b>age 7</b>.
      </div>
      <div class="field">
        <label>Roughly How Many Years You've Prayed Regularly</label>
        <input type="number" step="0.5" id="in_prayed" value="${p.yearsPrayed||0}" min="0">
        <div class="hint">Your best estimate of the years you prayed consistently — the rest is treated as qaza.</div>
      </div>
      <div id="estimateBox"></div>
      <button class="btn" id="btnSaveSetup">Get Started</button>
      ${prefill ? '<button class="btn secondary" id="btnCancelSetup">Cancel</button>' : ''}
    </div>
  `;

  function updateEstimate(){
    const dob = document.getElementById('in_dob').value;
    const prayed = parseFloat(document.getElementById('in_prayed').value)||0;
    const box = document.getElementById('estimateBox');
    if (!dob){ box.innerHTML=''; return; }
    const age = ageFromDOB(dob);
    const obligatoryYears = Math.max(0, age.decimalYears - FARD_AGE);
    const missedYears = Math.max(0, obligatoryYears - prayed);
    const perPrayer = Math.round(missedYears * 365);
    box.innerHTML = `
      <div class="estimate-box">
        Your age: <b>${age.years} years, ${age.months} months, ${age.days} days</b><br>
        Years since prayer became obligatory: <b>${obligatoryYears.toFixed(1)} years</b><br>
        Estimated qaza years: <b>${missedYears.toFixed(1)} years</b><br>
        Estimated qaza per prayer (Fajr/Dhuhr/Asr/Maghrib/Isha): <b>${perPrayer}</b> each<br>
        Total estimated qaza prayers: <b>${perPrayer*5}</b>
      </div>
    `;
  }
  ['in_dob','in_prayed'].forEach(id=>{
    document.getElementById(id).addEventListener('input', updateEstimate);
  });
  updateEstimate();

  document.getElementById('btnSaveSetup').addEventListener('click', async ()=>{
    const dob = document.getElementById('in_dob').value;
    if (!dob){ showToast('Please enter your date of birth'); return; }
    const prayed = parseFloat(document.getElementById('in_prayed').value)||0;
    const age = ageFromDOB(dob);
    const obligatoryYears = Math.max(0, age.decimalYears - FARD_AGE);
    const missedYears = Math.max(0, obligatoryYears - prayed);
    const perPrayer = Math.round(missedYears * 365);
    const init = {};
    PRAYERS.forEach(pr => init[pr.key] = perPrayer);

    const btn = document.getElementById('btnSaveSetup');
    btn.textContent = 'Saving...'; btn.disabled = true;
    try{
      await apiPost('saveProfile', {
        dob, baligAge: FARD_AGE, yearsPrayed: prayed, init, setupDate: todayStr()
      });
      showToast('Profile saved ✅');
      await bootAfterSetup();
    } catch(err){
      showToast(err.message || 'Could not save, please try again');
      btn.textContent = 'Get Started'; btn.disabled = false;
    }
  });

  if (prefill){
    document.getElementById('btnCancelSetup').addEventListener('click', ()=>{
      renderTab('home');
      bottomNav.classList.remove('hidden');
    });
  }
}

async function bootAfterSetup(){
  const profile = await apiGet('getProfile');
  STATE.profile = profile;
  await loadAppData();
  renderTab('home');
  bottomNav.classList.remove('hidden');
}

/* ======================= TAB SWITCHING ======================= */
document.addEventListener('click', (e)=>{
  const navBtn = e.target.closest('.nav-btn');
  if (navBtn){
    renderTab(navBtn.dataset.tab);
  }
});

function renderTab(tab){
  STATE.activeTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  if (tab === 'home') renderHome();
  else if (tab === 'qaza') renderQaza();
  else if (tab === 'history') renderHistory();
}

/* ======================= HOME TAB ======================= */
function renderHome(){
  const age = ageFromDOB(STATE.profile.dob);
  const rec = STATE.todayRecord;
  const doneFlags = {};
  PRAYERS.forEach(p => doneFlags[p.key] = rec ? rec[p.key].prayed : false);

  shell.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <span class="kicker">Today</span>
        <h1>${formatDateHuman(todayStr())}</h1>
      </div>
      <div class="gear" id="gearBtn">⚙️</div>
    </div>

    <div class="card">
      <div class="muted">Your Age</div>
      <div class="age-line"><b>${age.years}</b> years, <b>${age.months}</b> months, <b>${age.days}</b> days</div>
    </div>

    <div class="card">
      <div class="beads-row">
        <div class="bead-thread"></div>
        <div class="beads">
          ${PRAYERS.map(p=>`
            <div class="bead-wrap">
              <div class="bead ${doneFlags[p.key]?'done':''}"></div>
              <div class="bead-label">${p.label}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
        <h3 style="font-size:17px;">Today's Prayers</h3>
        <span class="muted" style="font-size:11.5px;">Prayed / Qaza Count</span>
      </div>
      <div id="prayerList"></div>
      <button class="btn" id="btnSaveDay">Save Today</button>
      <div class="save-note" id="saveNote"></div>
    </div>
  `;

  const list = document.getElementById('prayerList');
  list.innerHTML = PRAYERS.map(p=>{
    const prayed = doneFlags[p.key];
    const qazaVal = rec ? rec[p.key].qaza : 0;
    return `
      <div class="prayer-row" data-key="${p.key}">
        <button class="toggle-circle ${prayed?'on':''}" data-key="${p.key}">${prayed?'✓':''}</button>
        <div class="prayer-name">${p.label}<small>Today's obligatory prayer</small></div>
        <div class="qaza-input-wrap">
          <label>Qaza Prayed</label>
          <input type="number" min="0" class="qaza-input" data-key="${p.key}" value="${qazaVal}">
        </div>
      </div>
    `;
  }).join('');

  list.querySelectorAll('.toggle-circle').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      btn.classList.toggle('on');
      btn.textContent = btn.classList.contains('on') ? '✓' : '';
    });
  });

  document.getElementById('gearBtn').addEventListener('click', ()=>{
    renderSetup({
      dob: STATE.profile.dob,
      yearsPrayed: STATE.profile.yearsPrayed
    });
  });

  document.getElementById('btnSaveDay').addEventListener('click', saveToday);
}

async function saveToday(){
  const btn = document.getElementById('btnSaveDay');
  const note = document.getElementById('saveNote');
  btn.disabled = true; btn.textContent = 'Saving...';
  const data = {date: todayStr()};
  PRAYERS.forEach(p=>{
    const toggle = document.querySelector(`.toggle-circle[data-key="${p.key}"]`);
    const qazaInput = document.querySelector(`.qaza-input[data-key="${p.key}"]`);
    data[p.key] = {
      prayed: toggle.classList.contains('on'),
      qaza: parseInt(qazaInput.value)||0
    };
  });
  try{
    await apiPost('saveRecord', data);
    await loadAppData();
    note.style.color = 'var(--green-bright)';
    note.textContent = 'Saved ✅';
    btn.disabled = false; btn.textContent = 'Save Today';
    setTimeout(()=>{ note.textContent=''; }, 2500);
  } catch(err){
    note.style.color = 'var(--danger)';
    note.textContent = err.message || 'Could not save, please try again';
    btn.disabled = false; btn.textContent = 'Save Today';
  }
}

/* ======================= QAZA TAB (redesigned) ======================= */
function renderQaza(){
  const bal = STATE.summary.balance || {};
  const init = (STATE.summary.profile && STATE.summary.profile.init) || {};
  const total = STATE.summary.totalQaza || 0;
  const totalInit = PRAYERS.reduce((s,p)=> s + (Number(init[p.key])||0), 0);
  const clearedCount = Math.max(0, totalInit - total);
  const clearedPct = totalInit > 0 ? Math.round((clearedCount/totalInit)*100) : 100;

  const r = 70;
  const circumference = 2 * Math.PI * r;
  const clearedFraction = totalInit > 0 ? Math.min(1, clearedCount/totalInit) : 1;
  const dashOffset = circumference * (1 - clearedFraction);

  shell.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <span class="kicker">Balance</span>
        <h1>Qaza Prayers</h1>
      </div>
      <div class="gear" id="refreshBtn">↻</div>
    </div>

    <div class="card qaza-hero">
      <div class="ring-wrap">
        <svg width="172" height="172" viewBox="0 0 172 172">
          <circle cx="86" cy="86" r="${r}" stroke="rgba(255,255,255,0.06)" stroke-width="14" fill="none"/>
          <circle cx="86" cy="86" r="${r}" stroke="#d4af37" stroke-width="14" fill="none"
            stroke-linecap="round"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${dashOffset}"
            transform="rotate(-90 86 86)"/>
        </svg>
        <div class="ring-center">
          <div class="num">${total}</div>
          <div class="lbl">PRAYERS<br>REMAINING</div>
        </div>
      </div>
      <div class="cleared-pill">${clearedPct}% cleared</div>
    </div>

    <div class="card">
      ${PRAYERS.map(p=>{
        const remaining = bal[p.key] ?? 0;
        const initial = Number(init[p.key])||0;
        const pct = initial > 0 ? Math.round(((initial - remaining)/initial)*100) : 100;
        return `
          <div class="qaza-row">
            <div class="qaza-row-top">
              <div class="qaza-icon-name">
                <span class="qaza-icon">${p.icon}</span> ${p.label}
              </div>
              <div class="qaza-count">${remaining} <small>left</small></div>
            </div>
            <div class="qaza-bar-track">
              <div class="qaza-bar-fill" style="width:${Math.min(100,Math.max(0,pct))}%"></div>
            </div>
            <div class="qaza-row-bottom">${pct}% cleared · ${initial} originally estimated</div>
          </div>
        `;
      }).join('')}
    </div>

    <div class="card">
      <div class="muted" style="line-height:1.6; font-size:12.5px;">
        This count starts from your initial estimate, adds one for every prayer left unchecked on the "Today" tab, and subtracts whatever you log in "Qaza Prayed" when you save a day.
      </div>
    </div>
  `;
  document.getElementById('refreshBtn').addEventListener('click', async ()=>{
    await loadAppData();
    renderQaza();
    showToast('Refreshed');
  });
}

/* ======================= HISTORY TAB ======================= */
async function renderHistory(){
  shell.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <span class="kicker">Record</span>
        <h1>History</h1>
      </div>
    </div>
    <div class="card">
      <div class="date-picker-row">
        <input type="date" id="histDate" value="${todayStr()}" max="${todayStr()}">
        <button class="btn" style="width:auto; padding:12px 18px;" id="histGo">View</button>
      </div>
      <div id="histDetail"></div>
    </div>
    <div class="card">
      <h3 style="font-size:16px; margin-bottom:6px;">Recent Days</h3>
      <div id="histList" class="muted">Loading...</div>
    </div>
  `;

  document.getElementById('histGo').addEventListener('click', async ()=>{
    const d = document.getElementById('histDate').value;
    if (!d) return;
    await showHistDetail(d);
  });
  await showHistDetail(todayStr());

  try{
    const all = await apiGet('getRecords');
    const recs = (all.records||[]).slice().sort((a,b)=> b.date.localeCompare(a.date)).slice(0,30);
    const listEl = document.getElementById('histList');
    if (!recs.length){
      listEl.innerHTML = 'No records yet.';
      return;
    }
    listEl.innerHTML = recs.map(r=>{
      const prayedCount = PRAYERS.filter(p=>r[p.key].prayed).length;
      const qazaCount = PRAYERS.reduce((s,p)=>s+(Number(r[p.key].qaza)||0),0);
      return `
        <div class="history-day">
          <div>
            <div class="d">${formatDateHuman(r.date)}</div>
            <div class="stats">Qaza prayed: ${qazaCount}</div>
          </div>
          <div class="badge">${prayedCount}/5</div>
        </div>
      `;
    }).join('');
  } catch(err){
    document.getElementById('histList').innerHTML = 'Could not load records.';
  }
}

async function showHistDetail(dateStr){
  const box = document.getElementById('histDetail');
  box.innerHTML = '<div class="muted" style="padding:10px 0;">Loading...</div>';
  try{
    const rec = await apiGet('getRecord', {date: dateStr});
    if (!rec.exists){
      box.innerHTML = `<div class="muted" style="padding:10px 0;">No record found for ${formatDateHuman(dateStr)}.</div>`;
      return;
    }
    box.innerHTML = `
      <div style="margin-top:6px;">
        ${PRAYERS.map(p=>`
          <div class="prayer-row">
            <button class="toggle-circle ${rec[p.key].prayed?'on':''}" style="pointer-events:none;">${rec[p.key].prayed?'✓':''}</button>
            <div class="prayer-name">${p.label}</div>
            <div class="qaza-input-wrap">
              <label>Qaza Prayed</label>
              <div style="font-size:15px; font-weight:600; padding:7px 4px;">${rec[p.key].qaza||0}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  } catch(err){
    box.innerHTML = '<div class="muted">Could not load this record.</div>';
  }
}

function formatDateHuman(dateStr){
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const [y,m,d] = dateStr.split('-').map(Number);
  return `${d} ${months[m-1]} ${y}`;
}

/* Boot */
init();
</script>
