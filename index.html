<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0F1A">
<title>Namaz Tracker</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0e1a;
    --bg-deep2:#0e1424;
    --panel: rgba(24,34,56,0.55);
    --panel-solid:#141c31;
    --border: rgba(212,175,55,0.16);
    --border-strong: rgba(212,175,55,0.32);
    --gold:#d4af37;
    --gold-soft:#c9a85c;
    --gold-dim: rgba(212,175,55,0.15);
    --green:#2f8f6f;
    --green-bright:#3fbf93;
    --ivory:#ece6d6;
    --muted:#8b96ad;
    --danger:#c1554a;
    --radius:18px;
    --nav-h:70px;
    --savebar-h:84px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--ivory);
    background:
      radial-gradient(1px 1px at 20% 15%, rgba(255,255,255,0.5) 0, transparent 50%),
      radial-gradient(1px 1px at 70% 8%, rgba(255,255,255,0.35) 0, transparent 50%),
      radial-gradient(1.5px 1.5px at 85% 25%, rgba(255,255,255,0.4) 0, transparent 50%),
      radial-gradient(1px 1px at 40% 35%, rgba(255,255,255,0.3) 0, transparent 50%),
      radial-gradient(1px 1px at 10% 55%, rgba(255,255,255,0.25) 0, transparent 50%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-deep2) 60%, #0c1220 100%);
    min-height:100%;
    -webkit-font-smoothing:antialiased;
  }
  .shell{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    padding:env(safe-area-inset-top) 16px calc(var(--nav-h) + var(--savebar-h) + env(safe-area-inset-bottom)) 16px;
    position:relative;
  }
  h1,h2,h3{font-family:'Amiri',serif; font-weight:700; margin:0;}
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 2px 14px 2px;
  }
  .brand{display:flex; flex-direction:column; gap:2px;}
  .brand .kicker{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold-soft);}
  .brand h1{font-size:26px; color:var(--ivory);}
  .brand .greet{font-size:13px; color:var(--muted); margin-top:2px;}
  .gear{
    width:38px;height:38px;border-radius:50%;
    background:var(--panel); border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center; cursor:pointer;
    color:var(--gold-soft); font-size:18px; flex-shrink:0;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
    backdrop-filter: blur(6px);
  }
  .muted{color:var(--muted); font-size:13px;}
  .age-line{font-size:15px; color:var(--ivory); margin-top:4px;}
  .age-line b{color:var(--gold);}
  .age-warn{font-size:12.5px; color:var(--gold-soft); margin-top:8px; line-height:1.5;}
  .age-warn a{color:var(--gold); cursor:pointer; text-decoration:underline;}

  /* Tasbih beads row (signature element) */
  .beads{display:flex; justify-content:space-between; align-items:center; margin:6px 0 4px 0; padding:0 4px;}
  .bead-wrap{display:flex; flex-direction:column; align-items:center; gap:8px; flex:1;}
  .bead{
    width:34px;height:34px;border-radius:50%;
    border:2px solid var(--border-strong);
    background:radial-gradient(circle at 35% 30%, #1c2540, #10162a);
    transition:all .25s ease;
    position:relative;
  }
  .bead.done{
    background:radial-gradient(circle at 35% 30%, #f3d879, var(--gold));
    border-color:var(--gold);
    box-shadow:0 0 14px rgba(212,175,55,0.55);
  }
  .bead-label{font-size:10.5px; color:var(--muted); letter-spacing:.03em;}
  .bead-thread{
    position:absolute; top:17px; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, var(--border-strong) 15%, var(--border-strong) 85%, transparent);
    z-index:0;
  }
  .beads-row{position:relative;}

  .prayer-list-scroll{
    max-height:44vh;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    margin:0 -4px;
    padding:0 4px;
  }
  .prayer-row{
    display:flex; align-items:center; gap:12px;
    padding:12px 4px; border-bottom:1px solid var(--border);
  }
  .prayer-row:last-child{border-bottom:none;}
  .toggle-circle{
    width:30px;height:30px;border-radius:50%;
    border:2px solid var(--border-strong);
    background:transparent; flex-shrink:0; cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    color:transparent; font-size:15px; transition:all .18s ease;
  }
  .toggle-circle.on{
    background:var(--green-bright); border-color:var(--green-bright); color:#08130f;
  }
  .prayer-name{flex:1; font-size:16px; font-weight:600;}
  .prayer-name small{display:block; font-weight:400; color:var(--muted); font-size:11.5px; margin-top:1px;}
  .qaza-input-wrap{display:flex; flex-direction:column; align-items:flex-end; gap:2px;}
  .qaza-input-wrap label{font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em;}
  .qaza-input{
    width:56px; text-align:center; padding:7px 4px;
    border-radius:10px; border:1px solid var(--border-strong);
    background:#0d1425; color:var(--ivory); font-size:15px; font-family:'Inter';
  }
  .qaza-input:focus{outline:1px solid var(--gold); border-color:var(--gold);}

  .btn{
    display:block; width:100%; padding:14px; border-radius:14px; border:none;
    font-family:'Inter'; font-weight:600; font-size:15px; cursor:pointer;
    background:linear-gradient(180deg, var(--gold), var(--gold-soft));
    color:#1a1405; margin-top:6px;
  }
  .btn:active{transform:scale(0.98);}
  .btn.secondary{
    background:transparent; border:1px solid var(--border-strong); color:var(--ivory);
  }
  .btn.danger{background:var(--danger); color:#fff;}
  .btn:disabled{opacity:0.6;}

  .save-note{text-align:center; font-size:12.5px; color:var(--green-bright); margin-top:8px; min-height:16px;}

  /* Sticky save bar — floats above the bottom nav */
  .save-bar{
    position:fixed; left:0; right:0;
    bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
    display:flex; justify-content:center;
    padding:14px 16px 10px 16px;
    background:linear-gradient(180deg, transparent, rgba(9,12,22,0.92) 35%, #0a0e1a 78%);
    z-index:55;
  }
  .save-bar-inner{width:100%; max-width:448px;}

  /* Qaza tab — redesigned */
  .qaza-hero{
    display:flex; flex-direction:column; align-items:center; padding:26px 10px 18px 10px;
  }
  .ring-wrap{position:relative; width:172px; height:172px;}
  .ring-center{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
  }
  .ring-center .num{font-family:'Amiri',serif; font-size:42px; color:var(--ivory); line-height:1;}
  .ring-center .lbl{font-size:11.5px; color:var(--muted); margin-top:4px; letter-spacing:.03em;}
  .cleared-pill{
    margin-top:14px; background:var(--gold-dim); border:1px solid var(--border-strong);
    color:var(--gold); font-size:12.5px; font-weight:600; padding:6px 14px; border-radius:20px;
  }

  .goal-status{
    text-align:center; margin-top:14px; font-size:12.5px; font-weight:600;
    color:var(--muted); background:rgba(255,255,255,0.04); border:1px solid var(--border);
    padding:7px 14px; border-radius:20px; transition:all .25s ease;
  }
  .goal-status.complete{
    color:var(--gold); background:var(--gold-dim); border-color:var(--border-strong);
  }

  .qaza-row{padding:14px 2px; border-bottom:1px solid var(--border);}
  .qaza-row:last-child{border-bottom:none;}
  .qaza-row-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
  .qaza-icon-name{display:flex; align-items:center; gap:9px; font-size:15px; font-weight:600;}
  .qaza-icon{
    width:26px;height:26px;border-radius:8px; background:var(--gold-dim);
    display:flex;align-items:center;justify-content:center; font-size:13px;
  }
  .qaza-count{font-size:15px; font-weight:700; color:var(--gold);}
  .qaza-count small{font-weight:400; color:var(--muted); font-size:11px;}
  .qaza-bar-track{
    height:8px; border-radius:6px; background:rgba(255,255,255,0.06); overflow:hidden;
  }
  .qaza-bar-fill{
    height:100%; border-radius:6px;
    background:linear-gradient(90deg, var(--green), var(--green-bright));
    transition:width .4s ease;
  }
  .qaza-row-bottom{font-size:11.5px; color:var(--muted); margin-top:6px;}

  /* Times tab */
  .clock-hero{text-align:center; padding:22px 10px 16px 10px;}
  .clock-hero .time{font-family:'Amiri',serif; font-size:44px; color:var(--gold); line-height:1;}
  .clock-hero .place{color:var(--muted); font-size:13px; margin-top:6px;}
  .time-row{
    display:flex; align-items:center; gap:12px;
    padding:14px 4px; border-bottom:1px solid var(--border);
  }
  .time-row:last-child{border-bottom:none;}
  .time-row.active{
    background:linear-gradient(90deg, rgba(212,175,55,0.1), transparent);
    border-radius:12px; margin:0 -8px; padding:14px 8px;
  }
  .time-icon{
    width:36px;height:36px;border-radius:10px; background:var(--gold-dim);
    display:flex;align-items:center;justify-content:center; font-size:17px; flex-shrink:0;
  }
  .time-info{flex:1;}
  .time-info .name{font-size:15.5px; font-weight:600; display:flex; align-items:center; gap:8px;}
  .now-badge{
    background:var(--green-bright); color:#08130f; font-size:10px; font-weight:700;
    padding:2px 8px; border-radius:10px; letter-spacing:.03em;
  }
  .time-info .range{font-size:12.5px; color:var(--muted); margin-top:2px;}
  .time-source{font-size:11.5px; color:var(--muted); line-height:1.6; text-align:center; padding:4px 6px;}

  /* Setup screen */
  .setup-hero{text-align:center; padding:36px 10px 20px 10px;}
  .setup-hero h1{font-size:30px;}
  .setup-hero p{color:var(--muted); font-size:14px; margin-top:8px; line-height:1.5;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12.5px; color:var(--gold-soft); margin-bottom:6px; letter-spacing:.02em;}
  .field input{
    width:100%; padding:13px 14px; border-radius:12px; border:1px solid var(--border-strong);
    background:#0d1425; color:var(--ivory); font-size:15px; font-family:'Inter';
  }
  .field .hint{font-size:11.5px; color:var(--muted); margin-top:5px; line-height:1.4;}
  .fixed-note{
    display:flex; align-items:center; gap:10px;
    background:rgba(255,255,255,0.03); border:1px dashed var(--border-strong); border-radius:12px;
    padding:12px 14px; margin-bottom:16px; font-size:12.5px; color:var(--muted); line-height:1.5;
  }
  .fixed-note b{color:var(--gold-soft);}
  .estimate-box{
    background:rgba(212,175,55,0.08); border:1px solid var(--border-strong); border-radius:14px;
    padding:14px; margin:10px 0 18px 0; font-size:13.5px; line-height:1.7;
  }
  .estimate-box b{color:var(--gold);}

  /* History */
  .history-day{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 4px; border-bottom:1px solid var(--border);
  }
  .history-day:last-child{border-bottom:none;}
  .history-day .d{font-size:14px; font-weight:600;}
  .history-day .stats{font-size:12px; color:var(--muted); margin-top:2px;}
  .history-day .badge{
    background:rgba(63,191,147,0.14); color:var(--green-bright); border-radius:20px;
    padding:5px 10px; font-size:12px; font-weight:600;
  }
  .date-picker-row{display:flex; gap:10px; margin-bottom:14px;}
  .date-picker-row input{flex:1;}
  .history-day .badge.goal{
    background:var(--gold-dim); color:var(--gold); border:1px solid var(--border-strong);
  }
  .filter-toggle{
    display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted); cursor:pointer;
    user-select:none;
  }
  .filter-toggle input{width:16px; height:16px; accent-color:var(--gold);}
  .filter-toggle input:checked + span{color:var(--gold);}
  .goal-banner{
    display:flex; align-items:center; gap:8px; background:var(--gold-dim); color:var(--gold);
    border:1px solid var(--border-strong); border-radius:12px; padding:10px 14px;
    font-size:13px; font-weight:600; margin-bottom:10px;
  }

  .toast{
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    background:#141c31; border:1px solid var(--border-strong); color:var(--ivory);
    padding:10px 18px; border-radius:30px; font-size:13px; z-index:999;
    opacity:0; transition:opacity .3s ease; pointer-events:none; text-align:center; max-width:90vw;
  }
  .toast.show{opacity:1;}

  .loading-wrap{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:14px;}
  .spinner{
    width:34px;height:34px;border-radius:50%;
    border:3px solid var(--border); border-top-color:var(--gold);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .config-warning{
    background:rgba(193,85,74,0.12); border:1px solid var(--danger); border-radius:14px;
    padding:14px; font-size:13px; line-height:1.6; margin-bottom:16px;
  }
  .config-warning code{background:#1a1020; padding:2px 6px; border-radius:6px; font-size:11.5px;}

  /* Bottom nav */
  .nav{
    position:fixed; bottom:0; left:0; right:0;
    display:flex; justify-content:center;
    padding:10px 16px calc(10px + env(safe-area-inset-bottom)) 16px;
    background:linear-gradient(180deg, transparent, rgba(6,9,17,0.85) 25%, #06090f 100%);
    z-index:60;
  }
  .nav-inner{
    width:100%; max-width:448px;
    display:flex; background:var(--panel-solid); border:1px solid var(--border);
    border-radius:18px; overflow:hidden;
  }
  .nav-btn{
    flex:1; padding:11px 4px; text-align:center; background:none; border:none;
    color:var(--muted); font-family:'Inter'; font-size:11px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .nav-btn .ic{font-size:17px;}
  .nav-btn.active{color:var(--gold);}

  .hidden{display:none !important;}
</style>
</head>
<body>

<div class="shell" id="shell">
  <div class="loading-wrap" id="globalLoader">
    <div class="spinner"></div>
    <div class="muted">Loading...</div>
  </div>
</div>

<div class="save-bar hidden" id="saveBar"></div>

<div class="nav hidden" id="bottomNav">
  <div class="nav-inner">
    <button class="nav-btn active" data-tab="home"><span class="ic">🕌</span>Today</button>
    <button class="nav-btn" data-tab="qaza"><span class="ic">📿</span>Qaza</button>
    <button class="nav-btn" data-tab="times"><span class="ic">🕰️</span>Times</button>
    <button class="nav-btn" data-tab="history"><span class="ic">📅</span>History</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ======================= CONFIG ======================= */
/* Paste your Google Apps Script Web App URL here.
   You get this after deploying — see README.md for the full walkthrough. */
const CONFIG = {
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbxx0T6Lw0k7lo3Cz2Y_BTf1XhrOG_XpNiw7jcvIE-8ag74linfPXCTptmMId-qFXcHE/exec"
};
/* ======================================================= */

/* Age at which prayer becomes obligatory — fixed at 7 (not user-editable). */
const FARD_AGE = 7;

/* Prayer-times source: Aladhan API, University of Islamic Sciences Karachi
   method (method=1), Hanafi Asr timing (school=1) — the standard combination
   used across Pakistan, for Lahore specifically. */
const PRAYER_TIMES_CITY = 'Lahore';
const PRAYER_TIMES_COUNTRY = 'Pakistan';
const PRAYER_TIMES_TZ = 'Asia/Karachi';

const PRAYERS = [
  {key:'Fajr', label:'Fajr', icon:'🌄'},
  {key:'Dhuhr', label:'Dhuhr', icon:'☀️'},
  {key:'Asr', label:'Asr', icon:'🌤️'},
  {key:'Maghrib', label:'Maghrib', icon:'🌇'},
  {key:'Isha', label:'Isha', icon:'🌙'}
];

const shell = document.getElementById('shell');
const bottomNav = document.getElementById('bottomNav');
const saveBar = document.getElementById('saveBar');
const toastEl = document.getElementById('toast');

let STATE = {
  profile: null,
  summary: null,
  todayRecord: null,
  activeTab: 'home',
  timings: null,
  clockInterval: null,
  historyCache: null,
  historyLastDate: null,
  historyFilterOn: false,
  recordCache: {},
  timesRefs: null
};

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(()=>toastEl.classList.remove('show'), 2200);
}

/* ---------------- API layer (JSONP — avoids CORS issues entirely) ---------------- */
function jsonp(url){
  return new Promise((resolve, reject)=>{
    const cbName = 'cb_' + Math.random().toString(36).slice(2) + Date.now();
    const script = document.createElement('script');
    let settled = false;

    const cleanup = ()=>{
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timer);
    };

    window[cbName] = (data)=>{
      if (settled) return;
      settled = true;
      cleanup();
      resolve(data);
    };

    script.onerror = ()=>{
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error('Could not reach the server. Check your internet connection and the Apps Script URL in CONFIG.SCRIPT_URL.'));
    };

    const timer = setTimeout(()=>{
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error('The server took too long to respond. Please try again.'));
    }, 15000);

    const sep = url.indexOf('?') === -1 ? '?' : '&';
    script.src = url + sep + 'callback=' + cbName;
    document.body.appendChild(script);
  });
}

async function apiGet(action, params={}){
  const usp = new URLSearchParams({action, ...params});
  const result = await jsonp(`${CONFIG.SCRIPT_URL}?${usp.toString()}`);
  if (result && result.error) throw new Error(result.error);
  return result;
}
async function apiPost(action, data){
  const usp = new URLSearchParams({action, payload: JSON.stringify(data)});
  const result = await jsonp(`${CONFIG.SCRIPT_URL}?${usp.toString()}`);
  if (result && result.error) throw new Error(result.error);
  return result;
}

/* ---------------- Age calculation (robust against odd date formats) ---------------- */
function parseDobFlexible(dobRaw){
  if (!dobRaw) return null;
  if (typeof dobRaw === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(dobRaw.trim())){
    const d = new Date(dobRaw.trim()+'T00:00:00');
    if (!isNaN(d.getTime())) return d;
  }
  const generic = new Date(dobRaw);
  if (!isNaN(generic.getTime())) return generic;
  return null;
}

function ageFromDOB(dobRaw, asOf=new Date()){
  const dob = parseDobFlexible(dobRaw);
  if (!dob) return null;
  let years = asOf.getFullYear() - dob.getFullYear();
  let months = asOf.getMonth() - dob.getMonth();
  let days = asOf.getDate() - dob.getDate();
  if (days < 0){
    months -= 1;
    const prevMonth = new Date(asOf.getFullYear(), asOf.getMonth(), 0);
    days += prevMonth.getDate();
  }
  if (months < 0){ months += 12; years -= 1; }
  const decimalYears = (asOf - dob) / (1000*60*60*24*365.25);
  return {years, months, days, decimalYears};
}

/* ======================= INIT ======================= */
async function init(){
  if (!CONFIG.SCRIPT_URL || CONFIG.SCRIPT_URL.indexOf('PASTE_YOUR') === 0){
    renderConfigMissing();
    return;
  }
  try{
    const profile = await apiGet('getProfile');
    if (!profile.exists){
      renderSetup();
    } else {
      STATE.profile = profile;
      await loadAppData();
      renderTab('home');
      bottomNav.classList.remove('hidden');
    }
  } catch(err){
    renderError(err);
  }
}

async function loadAppData(){
  const [summary, todayRecord] = await Promise.all([
    apiGet('getSummary'),
    apiGet('getRecord', {date: todayStr()})
  ]);
  STATE.summary = summary;
  STATE.todayRecord = todayRecord.exists ? todayRecord : null;
}

function renderConfigMissing(){
  shell.innerHTML = `
    <div class="setup-hero">
      <h1>🕌 Namaz Tracker</h1>
    </div>
    <div class="config-warning">
      <b>Setup needed:</b><br><br>
      To connect this app to Google Sheets, open <code>index.html</code> and paste your
      Apps Script Web App URL into <code>CONFIG.SCRIPT_URL</code>.<br><br>
      The full walkthrough is in <b>README.md</b>.
    </div>
  `;
}

function renderError(err){
  shell.innerHTML = `
    <div class="setup-hero">
      <h1>⚠️ Something Went Wrong</h1>

/* ======================= SETUP SCREEN ======================= */
function renderSetup(prefill){
  clearClockInterval();
  bottomNav.classList.add('hidden');
  saveBar.classList.add('hidden');
  const p = prefill || {};
  shell.innerHTML = `
    <div class="setup-hero">
      <h1>🕌 Namaz Tracker</h1>
      <p>Enter your details so we can calculate your age and an estimate of your qaza (missed) prayers.</p>
    </div>
    <div class="card">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="in_name" value="${p.name||''}" placeholder="e.g. Khizar">
      </div>
      <div class="field">
        <label>Date of Birth</label>
        <input type="date" id="in_dob" value="${p.dob||''}">
      </div>
      <div class="fixed-note">
        ⚓ Prayers are counted as obligatory starting at <b>age 7</b>.
      </div>
      <div class="field">
        <label>Roughly How Many Years You've Prayed Regularly</label>
        <input type="number" step="0.5" id="in_prayed" value="${p.yearsPrayed||0}" min="0">
        <div class="hint">Your best estimate of the years you prayed consistently — the rest is treated as qaza.</div>
      </div>
      <div id="estimateBox"></div>
      <button class="btn" id="btnSaveSetup">Get Started</button>
      ${prefill ? '<button class="btn secondary" id="btnCancelSetup">Cancel</button>' : ''}
    </div>
  `;

  function updateEstimate(){
    const dob = document.getElementById('in_dob').value;
    const prayed = parseFloat(document.getElementById('in_prayed').value)||0;
    const box = document.getElementById('estimateBox');
    if (!dob){ box.innerHTML=''; return; }
    const age = ageFromDOB(dob);
    if (!age){ box.innerHTML=''; return; }
    const obligatoryYears = Math.max(0, age.decimalYears - FARD_AGE);
    const missedYears = Math.max(0, obligatoryYears - prayed);
    const perPrayer = Math.round(missedYears * 365);
    box.innerHTML = `
      <div class="estimate-box">
        Your age: <b>${age.years} years, ${age.months} months, ${age.days} days</b><br>
        Years since prayer became obligatory: <b>${obligatoryYears.toFixed(1)} years</b><br>
        Estimated qaza years: <b>${missedYears.toFixed(1)} years</b><br>
        Estimated qaza per prayer (Fajr/Dhuhr/Asr/Maghrib/Isha): <b>${perPrayer}</b> each<br>
        Total estimated qaza prayers: <b>${perPrayer*5}</b>
      </div>
    `;
  }
  ['in_dob','in_prayed'].forEach(id=>{
    document.getElementById(id).addEventListener('input', updateEstimate);
  });
  updateEstimate();

  document.getElementById('btnSaveSetup').addEventListener('click', async ()=>{
    const name = document.getElementById('in_name').value.trim();
    const dob = document.getElementById('in_dob').value;
    if (!name){ showToast('Please enter your name'); return; }
    if (!dob){ showToast('Please enter your date of birth'); return; }
    const age = ageFromDOB(dob);
    if (!age){ showToast('That date of birth looks invalid'); return; }
    const prayed = parseFloat(document.getElementById('in_prayed').value)||0;
    const obligatoryYears = Math.max(0, age.decimalYears - FARD_AGE);
    const missedYears = Math.max(0, obligatoryYears - prayed);
    const perPrayer = Math.round(missedYears * 365);
    const init = {};
    PRAYERS.forEach(pr => init[pr.key] = perPrayer);

    const btn = document.getElementById('btnSaveSetup');
    btn.textContent = 'Saving...'; btn.disabled = true;
    try{
      await apiPost('saveProfile', {
        name, dob, baligAge: FARD_AGE, yearsPrayed: prayed, init, setupDate: todayStr()
      });
      showToast('Profile saved ✅');
      await bootAfterSetup();
    } catch(err){
      showToast(err.message || 'Could not save, please try again');
      btn.textContent = 'Get Started'; btn.disabled = false;
    }
  });

  if (prefill){
    document.getElementById('btnCancelSetup').addEventListener('click', ()=>{
      renderTab('home');
      bottomNav.classList.remove('hidden');
    });
  }
}

async function bootAfterSetup(){
  const profile = await apiGet('getProfile');
  STATE.profile = profile;
  await loadAppData();
  renderTab('home');
  bottomNav.classList.remove('hidden');
}

        const initial = Number(init[p.key])||0;

function toMinutes(hhmm){
  if (!hhmm) return null;
  const clean = hhmm.split(' ')[0].trim();
  const [h,m] = clean.split(':').map(Number);
  if (isNaN(h) || isNaN(m)) return null;
  return h*60+m;
}

function to12h(hhmm){
  if (!hhmm) return '--:--';
  const clean = hhmm.split(' ')[0].trim();
  let [h,m] = clean.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if (h === 0) h = 12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

async function fetchLahoreTimings(){
  const d = new Date();
  const dateStr = `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
  const url = `https://api.aladhan.com/v1/timingsByCity/${dateStr}?city=${encodeURIComponent(PRAYER_TIMES_CITY)}&country=${encodeURIComponent(PRAYER_TIMES_COUNTRY)}&method=1&school=1`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Prayer times service is unavailable right now.');
  const json = await res.json();
  if (json.code !== 200 || !json.data || !json.data.timings) throw new Error('Could not load prayer times.');
  return json.data.timings;
}

async function loadTimes(isManualRefresh, silent){
  try{
    const timings = await fetchLahoreTimings();
    STATE.timings = timings;
    STATE.timingsDate = todayStr();
    if (STATE.activeTab === 'times'){
      buildTimesCard();
      startClockTicker();
    }
    if (isManualRefresh) showToast('Prayer times updated');
  } catch(err){
    if (silent) return; // background refresh failed quietly — keep showing cached data
    const card = document.getElementById('timesCard');
    if (card){
      card.innerHTML = `
        <div class="age-warn" style="text-align:center;">
          ${err.message || 'Could not load prayer times.'}<br><br>
          <a id="retryTimesLink">Tap to retry</a>
        </div>
      `;
      const retry = document.getElementById('retryTimesLink');
      if (retry) retry.addEventListener('click', ()=>loadTimes(true));
    }
  }
}

/* Builds the Times card DOM once, then startClockTicker() updates just the
   clock text + active-prayer highlight every second — no full rebuild,
   so it feels genuinely real-time with no refresh needed. */
function buildTimesCard(){
  const t = STATE.timings;
  if (!t) return;

  const windows = [
    {key:'Fajr', icon:'🌄', start: t.Fajr, end: t.Sunrise, endLabel:'Sunrise'},
    {key:'Dhuhr', icon:'☀️', start: t.Dhuhr, end: t.Asr, endLabel:'Asr'},
    {key:'Asr', icon:'🌤️', start: t.Asr, end: t.Maghrib, endLabel:'Maghrib'},
    {key:'Maghrib', icon:'🌇', start: t.Maghrib, end: t.Isha, endLabel:'Isha'},
    {key:'Isha', icon:'🌙', start: t.Isha, end: t.Fajr, endLabel:'Fajr (next day)'}
  ];

  const card = document.getElementById('timesCard');
  if (!card) return;
  card.innerHTML = `
    <div class="clock-hero">
      <div class="time" id="liveClock">--:--</div>
      <div class="place">Lahore, Pakistan · live</div>
    </div>
    ${windows.map(w=>`
      <div class="time-row" data-key="${w.key}">
        <div class="time-icon">${w.icon}</div>
        <div class="time-info">
          <div class="name">${w.key} <span class="now-badge" style="display:none;">NOW</span></div>
          <div class="range">Starts ${to12h(w.start)} · Until ${w.endLabel} (${to12h(w.end)})</div>
        </div>
      </div>
    `).join('')}
    <div class="time-source">Source: Aladhan API — University of Islamic Sciences, Karachi method (Sunni · Hanafi Asr timing), the calculation used across Pakistan's mosques.</div>
  `;

  STATE.timesRefs = {
    clockEl: document.getElementById('liveClock'),
    windows: windows.map(w => ({
      key: w.key,
      startMin: toMinutes(w.start),
      endMin: toMinutes(w.end),
      rowEl: card.querySelector(`.time-row[data-key="${w.key}"]`),
      badgeEl: card.querySelector(`.time-row[data-key="${w.key}"] .now-badge`)
    })),
    fajrMin: toMinutes(t.Fajr)
  };

  tickClock();
}

function startClockTicker(){
  clearClockInterval();
  STATE.clockInterval = setInterval(()=>{
    if (STATE.activeTab === 'times') tickClock();
  }, 1000);
}

function tickClock(){
  const refs = STATE.timesRefs;
  if (!refs || !refs.clockEl) return;
  const nowLahore = new Date(new Date().toLocaleString('en-US', {timeZone: PRAYER_TIMES_TZ}));
  const nowMin = nowLahore.getHours()*60 + nowLahore.getMinutes();
  refs.clockEl.textContent = nowLahore.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', second:'2-digit'});

  refs.windows.forEach(w=>{
    let active = false;
    if (w.startMin !== null && w.endMin !== null){
      if (w.key === 'Isha') active = nowMin >= w.startMin || nowMin < refs.fajrMin;
      else if (w.endMin <= w.startMin) active = nowMin >= w.startMin || nowMin < w.endMin;
      else active = nowMin >= w.startMin && nowMin < w.endMin;
    }
    if (w.rowEl) w.rowEl.classList.toggle('active', active);
    if (w.badgeEl) w.badgeEl.style.display = active ? 'inline-block' : 'none';
  });
}

  document.getElementById('goalFilter').addEventListener('change', (e)=>{

  });

  // Render instantly from cache (no reload flicker on tab revisit)...
  if (STATE.historyCache) renderHistList(STATE.historyCache, STATE.historyFilterOn);
  await showHistDetail(viewDate);

  // ...then quietly refresh in the background so the cache stays current.
  try{
    const all = await apiGet('getRecords');
    const recs = (all.records||[]).slice().sort((a,b)=> (normalizeDateStr(b.date)||'').localeCompare(normalizeDateStr(a.date)||'')).slice(0,30);

function renderHistList(recs, onlyGoal){
  const listEl = document.getElementById('histList');
  if (!listEl) return;
  if (!recs.length){
    listEl.innerHTML = 'No records yet.';
    return;
  }
  const rows = recs.map(r=>{
    const prayedCount = PRAYERS.filter(p=>r[p.key].prayed).length;
    const qazaCount = PRAYERS.reduce((s,p)=>s+(Number(r[p.key].qaza)||0),0);
    const goalComplete = prayedCount === 5;
    return {r, prayedCount, qazaCount, goalComplete};
  }).filter(x => !onlyGoal || x.goalComplete);

  if (!rows.length){
    listEl.innerHTML = 'No days match — keep going, your first 5/5 day will show up here 🎯';
    return;
  }

  listEl.innerHTML = rows.map(({r, prayedCount, qazaCount, goalComplete})=>`
    <div class="history-day">
      <div>
        <div class="d">${formatDateHuman(r.date)}${goalComplete ? ' 🎯' : ''}</div>
        <div class="stats">Qaza prayed: ${qazaCount}</div>
      </div>
      <div class="badge ${goalComplete ? 'goal' : ''}">${prayedCount}/5</div>
    </div>
  `).join('');
}

async function showHistDetail(dateStr){
  const box = document.getElementById('histDetail');
  const cached = STATE.recordCache[dateStr];

  const renderDetail = (rec)=>{
    if (!box) return;
    if (!rec.exists){
      box.innerHTML = `<div class="muted" style="padding:10px 0;">No record found for ${formatDateHuman(dateStr)}.</div>`;
      return;
    }
    const prayedCount = PRAYERS.filter(p=>rec[p.key].prayed).length;
    const goalBanner = prayedCount === 5
      ? `<div class="goal-banner">🎯 Goal Completed — all 5 prayers on this day!</div>`
      : '';
    box.innerHTML = `
      ${goalBanner}
      <div style="margin-top:6px;">
        ${PRAYERS.map(p=>`
          <div class="prayer-row">
            <button class="toggle-circle ${rec[p.key].prayed?'on':''}" style="pointer-events:none;">${rec[p.key].prayed?'✓':''}</button>
            <div class="prayer-name">${p.label}</div>
            <div class="qaza-input-wrap">
              <label>Qaza Prayed</label>
              <div style="font-size:15px; font-weight:600; padding:7px 4px;">${rec[p.key].qaza||0}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  };

  if (cached){
    renderDetail(cached);
  } else {
    box.innerHTML = '<div class="muted" style="padding:10px 0;">Loading...</div>';
  }

  try{
    const rec = await apiGet('getRecord', {date: dateStr});
    STATE.recordCache[dateStr] = rec;
    if (STATE.activeTab === 'history') renderDetail(rec);
  } catch(err){
    if (!cached && box) box.innerHTML = '<div class="muted">Could not load this record.</div>';
  }
}

function normalizeDateStr(raw){
  if (!raw) return null;
  const str = String(raw).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  // Handles ISO datetime values like "2026-07-19T19:00:00.000Z" from legacy rows —
  // convert to the correct Pakistan-local calendar date rather than just chopping the string.
  const d = new Date(str);
  if (!isNaN(d.getTime())){
    return d.toLocaleDateString('en-CA', {timeZone: PRAYER_TIMES_TZ}); // en-CA => yyyy-mm-dd
  }
  return null;
}

function formatDateHuman(dateStr){
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const clean = normalizeDateStr(dateStr);
  if (!clean) return dateStr ? String(dateStr) : 'Unknown date';
  const [y,m,d] = clean.split('-').map(Number);
  if ([y,m,d].some(n => isNaN(n))) return String(dateStr);
  return `${d} ${months[m-1]} ${y}`; // Pakistani/international day-month-year order
}

/* Boot */
init();
</script>
